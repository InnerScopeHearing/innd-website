<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 88" width="240" height="88" role="img" aria-label="iHEARtest">
  <!-- iHEARtest welcome-screen lockup per brief section 5. Waveform arc mark + wordmark.
       "iHEAR" in primary teal #2E7D8C, "test" in secondary warm grey #5B6A72.
       SF Pro Display, system font fallback. -->
  <!-- Mark: single sine arc + terminal dot -->
  <g transform="translate(8,18)">
    <path d="M 6 38 Q 30 12, 56 22" fill="none" stroke="#2E7D8C" stroke-width="5" stroke-linecap="round"/>
    <circle cx="56" cy="22" r="3.6" fill="#2E7D8C"/>
  </g>
  <!-- Wordmark "iHEARtest" -->
  <text x="84" y="56"
        font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-weight="700" font-size="30" fill="#2E7D8C">iHEAR<tspan fill="#5B6A72" font-weight="500">test</tspan></text>
</svg>
