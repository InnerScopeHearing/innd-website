[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.processing]
  skip_processing = true

# ---------------------------------------------------------------------------
# Security headers
# ---------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP allows TradingView (Tier 1/2 widgets), OTC Markets (Tier 2 iframe),
    # Polygon and Finnhub (Tier 3 quote function CORS preflight),
    # and `'unsafe-inline'` for the TradingView embed bootstrap script.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://s3.tradingview.com https://*.tradingview.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.tradingview.com https://*.polygon.io https://*.finnhub.io; frame-src https://*.tradingview.com https://*.tradingview-widget.com https://www.otcmarkets.com; form-action 'self';"

# Long-cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---------------------------------------------------------------------------
# Redirects
# ---------------------------------------------------------------------------

# www -> apex
[[redirects]]
  from = "https://www.innd.com/*"
  to   = "https://innd.com/:splat"
  status = 301
  force  = true

# Catch-all for legacy press-release URLs that may still exist on press wires
# and aggregator backlinks. Lands on the IR press list rather than 404.
[[redirects]]
  from = "/news-releases/*"
  to   = "/#ir"
  status = 301
  force  = true
